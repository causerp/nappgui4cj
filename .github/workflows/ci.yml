name: CI

on: [push, pull_request]

jobs:
  build:
    name: Build on ${{ matrix.os }} with Cangjie ${{ matrix.cangjie_version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            cangjie_version: 1.0.5
          - os: windows-latest
            cangjie_version: 1.0.5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev
          sudo apt-get install -y libcurl4-openssl-dev
          sudo apt-get install -y libwebkit2gtk-4.1-dev
          sudo apt-get install -y mesa-common-dev libglu1-mesa-dev libegl1-mesa-dev

      - name: Setup llvm-mingw (Windows)
        if: runner.os == 'Windows'
        run: |
          $env:LLVM_VERSION = "20260311"
          $env:ARCHIVE_NAME = "llvm-mingw-$env:LLVM_VERSION-msvcrt-x86_64"
          Invoke-WebRequest -Uri "https://github.com/mstorsjo/llvm-mingw/releases/download/$env:LLVM_VERSION/$env:ARCHIVE_NAME.zip" -OutFile "llvm-mingw.zip"
          7z x "llvm-mingw.zip" -o"C:\llvm-mingw" -y
          echo "C:\llvm-mingw\$env:ARCHIVE_NAME\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify llvm-mingw installation (Windows)
        if: runner.os == 'Windows'
        run: clang --version

      - name: Setup Cangjie
        uses: Zxilly/setup-cangjie@d932a790bbb53ff47ead0609829d91a1e831a440
        with:
          channel: lts
          version: ${{ matrix.cangjie_version }}
          archive-path: ./cangjie-archive

      - name: Build
        run: cjpm build

      - name: Test
        run: cjpm test
